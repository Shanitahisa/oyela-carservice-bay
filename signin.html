<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- my css -->
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="log-in">
        <div class="form-logo">
            <img src="logo.png" alt="logo" width="200">

        </div>
        <div class="form-text">
            <p>Welcome to Oyela car service bay, kindly fill in this form to sign in</p>
        </div>
    <form action="" class="row g-3">
        
         <div class="form-floating col-12">
            <input type="text" class="form-control" id="floatingInput" placeholder="First name" aria-label="First name">
            <label for="floatingInput">First name</label>
        </div>
        <div class="form-floating col-12">
            <input type="text" class="form-control" id="floatingInput" placeholder="Last name" aria-label="Last name">
            <label for="floatingInput">Last name</label>
        </div>
        <div class="form-floating col-12">
            <input type="email" class="form-control" id="floatingInput" placeholder="enter your email address" aria-label="Email addressS">
            <label for="floatingInput">Email address</label>

        </div>
         <div class="form-floating col-12">
            <input type="text" class="form-control" id="floatingInput" placeholder="enter your contact" aria-label="contact">
            <label for="floatingInput">Contact</label>

        </div>
       

        <div class="checks">
        <div >
            <h4>Please select the type of vehicles you have</h4>
            <small>choose all types you have</small>
        </div>
        <div class="form-check">
        <input class="form-check-input" type="checkbox" name="flexRadioDefault" id="flexRadioDefault1">
        <label class="form-check-label" for="heavyvehicles">
            Heavy Vehicles
        </label>
        </div>
        <div class="form-check">
        <input class="form-check-input" type="checkbox" name="flexRadioDefault" id="flexRadioDefault1">
        <label class="form-check-label" for="smallvehicles">
            Small Vehicles
        </label>
        </div>
        <div class="form-check">
        <input class="form-check-input" type="checkbox" name="flexRadioDefault" id="flexRadioDefault1">
        <label class="form-check-label" for="commercialvehicles">
            Commercial Vehicles
        </label>
        </div>
        </div>
         <div class="form-floating col-12">
            <input type="password" class="form-control" id="floatingpassword" placeholder="create a strong password" aria-label="Password">
            <label for="floatingpassword">Create a strong password</label>
           
        </div>
        <div class="form-floating col-12">
             <input type="password" class="form-control" id="floatingpassword" placeholder="comfirm your password" aria-label="Password">
             <label for="floatingpassword">Comfirm Password</label>
        </div>

        <div class="signin">
            <button type="button" class="btn btn-success">Sign in</button>
            <p style="color: white;">| Already have an account? <a href="login.html">Login here</a></p>
        </div>


    </form>
    </div>
    
</body>
<!-- bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
</html>
